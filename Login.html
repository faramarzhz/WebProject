<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - WebChat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="form-container">
    <h1>Login</h1>

<script src="Login.js"></script>

</html>
